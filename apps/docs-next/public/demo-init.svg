<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
  <style>
    .bg { fill: #0D1117; }
    .chrome { fill: #161B22; }
    .dot { fill: #21262D; }
    .dot-r { fill: #F85149; }
    .dot-y { fill: #D29922; }
    .dot-g { fill: #2EA043; }
    .prompt { fill: #58A6FF; }
    .cmd { fill: #E6EDF3; }
    .dim { fill: #8B949E; }
    .ok { fill: #2EA043; }
    .accent { fill: #58A6FF; }
    .cursor { fill: #E6EDF3; }
    @keyframes blink { 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
    .line { opacity: 0; animation: reveal 0.01s forwards; }
    @keyframes reveal { to { opacity: 1; } }
    .l1  { animation-delay: 0.2s; }
    .l2  { animation-delay: 1.0s; }
    .l3  { animation-delay: 1.8s; }
    .l4  { animation-delay: 2.6s; }
    .l5  { animation-delay: 3.4s; }
    .l6  { animation-delay: 4.2s; }
    .l7  { animation-delay: 5.0s; }
    .l8  { animation-delay: 5.8s; }
    .l9  { animation-delay: 6.6s; }
    .l10 { animation-delay: 7.6s; }
    .l11 { animation-delay: 8.6s; }
  </style>

  <!-- Terminal frame -->
  <rect class="bg" width="800" height="440" rx="10" />
  <rect class="chrome" width="800" height="32" rx="10" />
  <rect class="chrome" y="22" width="800" height="10" />
  <circle class="dot-r" cx="18" cy="16" r="6" />
  <circle class="dot-y" cx="38" cy="16" r="6" />
  <circle class="dot-g" cx="58" cy="16" r="6" />
  <text class="dim" x="400" y="20" text-anchor="middle">agentskit init</text>

  <g transform="translate(20, 60)">
    <g class="line l1">
      <text class="prompt" y="0">$</text>
      <text class="cmd"    x="16" y="0">npx @agentskit/cli init</text>
    </g>

    <g class="line l2">
      <text class="accent" y="28">◈</text>
      <text class="dim"    x="20" y="28">Project name:</text>
      <text class="cmd"    x="148" y="28">my-agent</text>
    </g>

    <g class="line l3">
      <text class="accent" y="52">◈</text>
      <text class="dim"    x="20" y="52">Template:</text>
      <text class="cmd"    x="100" y="52">react</text>
      <text class="dim"    x="148" y="52">(React + Vite)</text>
    </g>

    <g class="line l4">
      <text class="accent" y="76">◈</text>
      <text class="dim"    x="20" y="76">Provider:</text>
      <text class="cmd"    x="100" y="76">openai</text>
    </g>

    <g class="line l5">
      <text class="accent" y="100">◈</text>
      <text class="dim"    x="20" y="100">Tools:</text>
      <text class="cmd"    x="76" y="100">web-search, fs</text>
    </g>

    <g class="line l6">
      <text class="accent" y="124">◈</text>
      <text class="dim"    x="20" y="124">Memory:</text>
      <text class="cmd"    x="84" y="124">file</text>
    </g>

    <g class="line l7">
      <text class="accent" y="148">◈</text>
      <text class="dim"    x="20" y="148">Package manager:</text>
      <text class="cmd"    x="168" y="148">pnpm</text>
    </g>

    <g class="line l8">
      <text class="ok"  y="180">✓</text>
      <text class="cmd" x="20" y="180">Scaffolded in</text>
      <text class="accent" x="128" y="180">my-agent/</text>
    </g>

    <g class="line l9">
      <text class="prompt" y="212">$</text>
      <text class="cmd"    x="16" y="212">cd my-agent &amp;&amp; pnpm dev</text>
    </g>

    <g class="line l10">
      <text class="accent" y="240">▲</text>
      <text class="cmd"    x="20" y="240">ready at</text>
      <text class="accent" x="92" y="240">http://localhost:5173</text>
    </g>

    <g class="line l11">
      <text class="dim" y="272">→ "Summarize the AgentsKit manifesto"</text>
      <text class="ok"  y="296">● streaming response in 340ms</text>
    </g>

    <rect class="cursor line l11" x="0" y="320" width="8" height="14" />
  </g>
</svg>
