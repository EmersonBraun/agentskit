name: Bug Report
description: Report a bug in AgentKit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create a component with useChat(...)
        2. Call chat.send('hello')
        3. See error in console
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentKit version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Next.js
        - Vite
        - Remix
        - TanStack Start
        - Other
    validations:
      required: true
