version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/react"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/ink"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/adapters"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/runtime"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/tools"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/skills"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/memory"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/observability"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/rag"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/sandbox"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/eval"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "weekly"
