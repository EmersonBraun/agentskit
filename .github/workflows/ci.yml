name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Verify core bundle size
        run: |
          SIZE=$(gzip -c packages/core/dist/index.js | wc -c)
          echo "Core gzipped: ${SIZE} bytes"
          if [ "$SIZE" -gt 10240 ]; then
            echo "::error::Core bundle exceeds 10KB gzipped limit (${SIZE} bytes)"
            exit 1
          fi
