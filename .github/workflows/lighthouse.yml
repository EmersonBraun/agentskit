name: Lighthouse CI

on:
  pull_request:
    paths:
      - 'apps/docs-next/**'
      - '.github/workflows/lighthouse.yml'

permissions:
  contents: read
  deployments: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Vercel previews may have Deployment Protection enabled, which makes the
      # public URL return 401 for unauthenticated pollers. Read the URL straight
      # from the GitHub deployments API instead of HTTP-probing, then pass the
      # VERCEL_AUTOMATION_BYPASS_SECRET through as a query param so Lighthouse
      # gets a 200 (and the auto-set cookie keeps subresources authenticated).
      - name: Resolve Vercel preview URL
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          for i in $(seq 1 60); do
            deployment=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?sha=${SHA}&per_page=50" \
              --jq '[.[] | select((.environment // "") | test("[Pp]review"))] | .[0]' 2>/dev/null || echo '{}')
            statuses_url=$(printf '%s' "$deployment" | jq -r '.statuses_url // empty')
            if [ -n "$statuses_url" ]; then
              target=$(gh api "$statuses_url" \
                --jq '[.[] | select(.state=="success") | .environment_url] | .[0] // empty' 2>/dev/null || echo "")
              if [ -n "$target" ]; then
                echo "url=$target" >> "$GITHUB_OUTPUT"
                echo "found preview: $target"
                exit 0
              fi
            fi
            echo "attempt $i: preview not ready yet"
            sleep 15
          done
          echo "::warning::No Vercel preview deployment resolved within 15 minutes — skipping Lighthouse."
          exit 0

      - name: Build Lighthouse URL list
        id: urls
        if: steps.preview.outputs.url != ''
        env:
          BASE: ${{ steps.preview.outputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -eu
          suffix=""
          if [ -n "$BYPASS" ]; then
            suffix="?x-vercel-protection-bypass=${BYPASS}&x-vercel-set-bypass-cookie=true"
          fi
          paths="/ /docs /docs/get-started/getting-started/quickstart /stack /showcase"
          {
            echo "urls<<EOF"
            for p in $paths; do
              echo "${BASE}${p}${suffix}"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI
        if: steps.preview.outputs.url != ''
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          urls: ${{ steps.urls.outputs.urls }}
          runs: 1
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Post Lighthouse summary
        if: always() && steps.preview.outputs.url != ''
        uses: actions/github-script@v9
        env:
          LH_MANIFEST: ${{ steps.lhci.outputs.manifest }}
        with:
          script: |
            const manifest = process.env.LH_MANIFEST
            if (!manifest) {
              console.log('No Lighthouse manifest; nothing to post.')
              return
            }
            let entries
            try {
              entries = JSON.parse(manifest)
            } catch (err) {
              console.log('Could not parse manifest:', err.message)
              return
            }
            const redact = (u) => String(u).replace(/([?&])x-vercel-protection-bypass=[^&]+/g, '$1x-vercel-protection-bypass=<redacted>')
            const pct = (n) => (typeof n === 'number' ? Math.round(n * 100) : '—')
            const rows = entries.map((e) => {
              const s = e.summary ?? {}
              return `| ${redact(e.url)} | ${pct(s.performance)} | ${pct(s.accessibility)} | ${pct(s['best-practices'])} | ${pct(s.seo)} |`
            })
            const body = [
              '## Lighthouse',
              '',
              '| URL | Performance | Accessibility | Best practices | SEO |',
              '|---|---|---|---|---|',
              ...rows,
              '',
              '_Run by `.github/workflows/lighthouse.yml`._',
            ].join('\n')
            const prNumber = context.payload.pull_request?.number
            if (!prNumber) return
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            })
